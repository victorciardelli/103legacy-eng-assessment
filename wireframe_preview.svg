<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #333; }
    .title { font-size: 14px; font-weight: bold; fill: #1a1a2e; }
    .label { font-size: 11px; fill: #666; }
    .annotation { font-size: 10px; fill: #999; font-style: italic; }
    .screen-title { font-size: 13px; font-weight: bold; fill: #333; }
    .screen-body { font-size: 10px; fill: #555; }
    .btn-text { font-size: 11px; fill: white; font-weight: bold; }
    .header-text { font-size: 10px; fill: white; }
  </style>

  <!-- Background -->
  <rect width="1200" height="900" fill="#f5f5f5" rx="8"/>
  
  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" class="title" font-size="18">103Legacy — Contributor Upload Flow (Wireframe)</text>
  <text x="600" y="55" text-anchor="middle" class="annotation" font-size="12">Low-fidelity reference. Use your own judgment on visual design, spacing, and polish.</text>

  <!-- ===== SCREEN 1: Landing ===== -->
  <g transform="translate(30, 80)">
    <text x="110" y="-8" text-anchor="middle" class="title">Screen 1: Landing</text>
    <!-- Phone frame -->
    <rect x="0" y="0" width="220" height="420" rx="16" fill="white" stroke="#ccc" stroke-width="1.5"/>
    <!-- Status bar -->
    <rect x="0" y="0" width="220" height="30" rx="16" fill="#1a1a2e"/>
    <rect x="0" y="16" width="220" height="14" fill="#1a1a2e"/>
    <text x="110" y="20" text-anchor="middle" class="header-text">103Legacy</text>
    
    <!-- Content -->
    <!-- Heart icon placeholder -->
    <circle cx="110" cy="75" r="20" fill="none" stroke="#ddd" stroke-width="1.5"/>
    <text x="110" y="80" text-anchor="middle" font-size="18">♥</text>
    
    <text x="110" y="115" text-anchor="middle" class="screen-title">Record a message for</text>
    <text x="110" y="133" text-anchor="middle" class="screen-title" font-size="16" fill="#1a1a2e">Grandma Rose</text>
    <text x="110" y="155" text-anchor="middle" class="screen-body">80th Birthday</text>
    <text x="110" y="170" text-anchor="middle" class="screen-body" fill="#999">Organized by Sarah</text>
    
    <!-- Divider -->
    <line x1="30" y1="190" x2="190" y2="190" stroke="#eee" stroke-width="1"/>
    
    <!-- Instructions -->
    <text x="30" y="215" class="screen-body" font-size="9">Record a short video message (up to 3 min).</text>
    <text x="30" y="230" class="screen-body" font-size="9">You can record now or upload from your</text>
    <text x="30" y="245" class="screen-body" font-size="9">camera roll.</text>

    <!-- Name field -->
    <text x="30" y="275" class="label" font-size="9">Your name</text>
    <rect x="30" y="280" width="160" height="30" rx="4" fill="white" stroke="#ccc"/>
    <text x="40" y="300" class="screen-body" fill="#bbb">Enter your name</text>

    <!-- Two buttons -->
    <rect x="30" y="330" width="160" height="36" rx="6" fill="#1a1a2e"/>
    <text x="110" y="353" text-anchor="middle" class="btn-text" font-size="10">Record Video</text>

    <rect x="30" y="375" width="160" height="36" rx="6" fill="white" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="110" y="398" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a2e">Choose from Camera Roll</text>
    
    <!-- Annotation -->
    <line x1="230" y1="345" x2="260" y2="345" stroke="#bbb" stroke-dasharray="3"/>
    <text x="265" y="340" class="annotation">Should trigger native</text>
    <text x="265" y="353" class="annotation">camera on mobile</text>
  </g>

  <!-- ===== SCREEN 2: Uploading ===== -->
  <g transform="translate(330, 80)">
    <text x="110" y="-8" text-anchor="middle" class="title">Screen 2: Uploading</text>
    <rect x="0" y="0" width="220" height="420" rx="16" fill="white" stroke="#ccc" stroke-width="1.5"/>
    <rect x="0" y="0" width="220" height="30" rx="16" fill="#1a1a2e"/>
    <rect x="0" y="16" width="220" height="14" fill="#1a1a2e"/>
    <text x="110" y="20" text-anchor="middle" class="header-text">103Legacy</text>

    <!-- Upload progress -->
    <text x="110" y="100" text-anchor="middle" class="screen-title">Uploading your video...</text>
    
    <!-- Video thumbnail placeholder -->
    <rect x="50" y="120" width="120" height="80" rx="6" fill="#f0f0f0" stroke="#ddd"/>
    <text x="110" y="165" text-anchor="middle" font-size="20" fill="#ccc">▶</text>
    
    <!-- Progress bar -->
    <text x="110" y="225" text-anchor="middle" class="screen-body">birthday_message.mov</text>
    <rect x="30" y="235" width="160" height="8" rx="4" fill="#eee"/>
    <rect x="30" y="235" width="104" height="8" rx="4" fill="#1a1a2e"/>
    <text x="110" y="260" text-anchor="middle" class="screen-body" font-weight="bold">65%</text>
    <text x="110" y="275" text-anchor="middle" class="screen-body" fill="#999">42 MB of 64 MB • ~30s remaining</text>

    <!-- Subtext -->
    <text x="110" y="310" text-anchor="middle" class="screen-body" font-size="9" fill="#999">Please keep this page open</text>
    <text x="110" y="325" text-anchor="middle" class="screen-body" font-size="9" fill="#999">until the upload is complete.</text>

    <!-- Cancel link -->
    <text x="110" y="370" text-anchor="middle" class="screen-body" fill="#c0392b" font-size="9">Cancel upload</text>

    <!-- Annotations -->
    <line x1="230" y1="245" x2="260" y2="245" stroke="#bbb" stroke-dasharray="3"/>
    <text x="265" y="237" class="annotation">Real-time progress</text>
    <text x="265" y="250" class="annotation">with % + file size</text>
    <text x="265" y="263" class="annotation">+ time estimate</text>
    
    <line x1="230" y1="315" x2="260" y2="315" stroke="#bbb" stroke-dasharray="3"/>
    <text x="265" y="310" class="annotation">Reassure user the</text>
    <text x="265" y="323" class="annotation">upload is still working</text>
  </g>

  <!-- ===== SCREEN 3: Success ===== -->
  <g transform="translate(630, 80)">
    <text x="110" y="-8" text-anchor="middle" class="title">Screen 3: Success</text>
    <rect x="0" y="0" width="220" height="420" rx="16" fill="white" stroke="#ccc" stroke-width="1.5"/>
    <rect x="0" y="0" width="220" height="30" rx="16" fill="#1a1a2e"/>
    <rect x="0" y="16" width="220" height="14" fill="#1a1a2e"/>
    <text x="110" y="20" text-anchor="middle" class="header-text">103Legacy</text>

    <!-- Success state -->
    <circle cx="110" cy="110" r="30" fill="none" stroke="#2d7d46" stroke-width="2"/>
    <text x="110" y="118" text-anchor="middle" font-size="28" fill="#2d7d46">✓</text>
    
    <text x="110" y="170" text-anchor="middle" class="screen-title">You're all set!</text>
    <text x="110" y="195" text-anchor="middle" class="screen-body">Your video message for</text>
    <text x="110" y="210" text-anchor="middle" class="screen-body" font-weight="bold">Grandma Rose</text>
    <text x="110" y="225" text-anchor="middle" class="screen-body">has been received.</text>

    <!-- Warm message -->
    <rect x="25" y="250" width="170" height="60" rx="6" fill="#f8f8f0"/>
    <text x="110" y="270" text-anchor="middle" class="screen-body" font-size="9" fill="#666">She's going to love hearing</text>
    <text x="110" y="285" text-anchor="middle" class="screen-body" font-size="9" fill="#666">from you. Thank you for being</text>
    <text x="110" y="300" text-anchor="middle" class="screen-body" font-size="9" fill="#666">part of this moment. ♥</text>

    <!-- Annotations -->
    <line x1="230" y1="170" x2="260" y2="170" stroke="#bbb" stroke-dasharray="3"/>
    <text x="265" y="163" class="annotation">Warm, emotional</text>
    <text x="265" y="176" class="annotation">confirmation. This is a</text>
    <text x="265" y="189" class="annotation">gift, not a form submission.</text>
  </g>

  <!-- ===== SCREEN 4: Error State ===== -->
  <g transform="translate(930, 80)">
    <text x="110" y="-8" text-anchor="middle" class="title">Screen 4: Error State</text>
    <rect x="0" y="0" width="220" height="420" rx="16" fill="white" stroke="#ccc" stroke-width="1.5"/>
    <rect x="0" y="0" width="220" height="30" rx="16" fill="#1a1a2e"/>
    <rect x="0" y="16" width="220" height="14" fill="#1a1a2e"/>
    <text x="110" y="20" text-anchor="middle" class="header-text">103Legacy</text>

    <!-- Error icon -->
    <circle cx="110" cy="100" r="24" fill="none" stroke="#c0392b" stroke-width="2"/>
    <text x="110" y="108" text-anchor="middle" font-size="22" fill="#c0392b">!</text>

    <text x="110" y="150" text-anchor="middle" class="screen-title" fill="#c0392b">Upload didn't go through</text>
    
    <!-- Specific error message -->
    <rect x="25" y="165" width="170" height="70" rx="6" fill="#fef5f5"/>
    <text x="110" y="185" text-anchor="middle" class="screen-body" font-size="9">Your video file is too large</text>
    <text x="110" y="200" text-anchor="middle" class="screen-body" font-size="9">(247 MB). The maximum size</text>
    <text x="110" y="215" text-anchor="middle" class="screen-body" font-size="9">is 500 MB.</text>
    <text x="110" y="230" text-anchor="middle" class="screen-body" font-size="9" fill="#999">→ see annotation</text>

    <!-- Recovery action -->
    <rect x="30" y="260" width="160" height="36" rx="6" fill="#1a1a2e"/>
    <text x="110" y="283" text-anchor="middle" class="btn-text" font-size="10">Try Again</text>

    <text x="110" y="315" text-anchor="middle" class="screen-body" fill="#1a1a2e" font-size="9">Choose a different video</text>

    <!-- Help text -->
    <text x="110" y="365" text-anchor="middle" class="screen-body" font-size="8" fill="#999">Having trouble? Text Sarah at</text>
    <text x="110" y="378" text-anchor="middle" class="screen-body" font-size="8" fill="#1a1a2e">(555) 123-4567</text>

    <!-- Annotations -->
    <line x1="230" y1="190" x2="260" y2="190" stroke="#bbb" stroke-dasharray="3"/>
    <text x="265" y="178" class="annotation">Error messages should</text>
    <text x="265" y="191" class="annotation">be specific + human-</text>
    <text x="265" y="204" class="annotation">readable with a clear</text>
    <text x="265" y="217" class="annotation">recovery action</text>
    
    <line x1="230" y1="370" x2="260" y2="370" stroke="#bbb" stroke-dasharray="3"/>
    <text x="265" y="365" class="annotation">Organizer contact as</text>
    <text x="265" y="378" class="annotation">escape hatch</text>
  </g>

  <!-- ===== BOTTOM: Dashboard wireframe ===== -->
  <g transform="translate(30, 540)">
    <text x="570" y="-8" text-anchor="middle" class="title" font-size="16">Organizer Dashboard (Desktop)</text>

    <!-- Browser frame -->
    <rect x="0" y="0" width="1140" height="340" rx="8" fill="white" stroke="#ccc" stroke-width="1.5"/>
    <!-- Browser bar -->
    <rect x="0" y="0" width="1140" height="30" rx="8" fill="#f0f0f0"/>
    <rect x="0" y="24" width="1140" height="6" fill="#f0f0f0"/>
    <circle cx="18" cy="15" r="5" fill="#ff5f57"/>
    <circle cx="35" cy="15" r="5" fill="#febc2e"/>
    <circle cx="52" cy="15" r="5" fill="#28c840"/>
    <rect x="200" y="7" width="300" height="16" rx="3" fill="white" stroke="#ddd"/>
    <text x="350" y="19" text-anchor="middle" font-size="8" fill="#999">localhost:5173/dashboard/test-card-001</text>

    <!-- Header area -->
    <text x="40" y="60" class="screen-title" font-size="15">Grandma Rose's 80th Birthday Card</text>
    <text x="40" y="78" class="screen-body" fill="#999">Organized by Sarah • Created Jan 15, 2026</text>

    <!-- Stats row -->
    <rect x="40" y="95" width="150" height="55" rx="6" fill="#f8f8f8"/>
    <text x="115" y="115" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">4</text>
    <text x="115" y="135" text-anchor="middle" class="screen-body" font-size="9" fill="#999">Videos Received</text>

    <rect x="210" y="95" width="150" height="55" rx="6" fill="#f8f8f8"/>
    <text x="285" y="115" text-anchor="middle" font-size="22" font-weight="bold" fill="#b8860b">3</text>
    <text x="285" y="135" text-anchor="middle" class="screen-body" font-size="9" fill="#999">Pending</text>

    <rect x="380" y="95" width="150" height="55" rx="6" fill="#f8f8f8"/>
    <text x="455" y="115" text-anchor="middle" font-size="22" font-weight="bold" fill="#c0392b">1</text>
    <text x="455" y="135" text-anchor="middle" class="screen-body" font-size="9" fill="#999">Failed</text>

    <!-- Progress bar -->
    <rect x="560" y="100" width="300" height="10" rx="5" fill="#eee"/>
    <rect x="560" y="100" width="150" height="10" rx="5" fill="#2d7d46"/>
    <text x="860" y="99" font-size="11" fill="#2d7d46" font-weight="bold">50%</text>
    <text x="560" y="130" class="screen-body" font-size="9" fill="#999">4 of 8 contributors have submitted</text>
    
    <!-- Contributor table -->
    <text x="40" y="175" class="screen-title" font-size="12">Contributors</text>
    
    <!-- Table header -->
    <rect x="40" y="185" width="1060" height="25" fill="#f5f5f5"/>
    <text x="60" y="202" class="label" font-size="9">NAME</text>
    <text x="250" y="202" class="label" font-size="9">STATUS</text>
    <text x="430" y="202" class="label" font-size="9">FILE</text>
    <text x="650" y="202" class="label" font-size="9">UPLOADED</text>
    <text x="850" y="202" class="label" font-size="9">ACTIONS</text>

    <!-- Row 1 -->
    <text x="60" y="228" class="screen-body">Uncle Mike</text>
    <rect x="250" y="216" width="65" height="18" rx="9" fill="#e8f5e9"/>
    <text x="282" y="229" text-anchor="middle" font-size="9" fill="#2d7d46">Received</text>
    <text x="430" y="228" class="screen-body" font-size="9">birthday_msg.mov (64MB)</text>
    <text x="650" y="228" class="screen-body" font-size="9">2 hours ago</text>

    <!-- Row 2 -->
    <text x="60" y="253" class="screen-body">Aunt Lisa</text>
    <rect x="250" y="241" width="65" height="18" rx="9" fill="#e8f5e9"/>
    <text x="282" y="254" text-anchor="middle" font-size="9" fill="#2d7d46">Received</text>
    <text x="430" y="253" class="screen-body" font-size="9">IMG_2847.MOV (128MB)</text>
    <text x="650" y="253" class="screen-body" font-size="9">5 hours ago</text>

    <!-- Row 3 - pending -->
    <text x="60" y="278" class="screen-body" fill="#999">Cousin Tommy</text>
    <rect x="250" y="266" width="65" height="18" rx="9" fill="#fff3e0"/>
    <text x="282" y="279" text-anchor="middle" font-size="9" fill="#b8860b">Pending</text>
    <text x="430" y="278" class="screen-body" font-size="9" fill="#999">—</text>
    <text x="650" y="278" class="screen-body" font-size="9" fill="#999">Link opened 1 day ago</text>
    <rect x="850" y="266" width="75" height="18" rx="4" fill="white" stroke="#1a1a2e"/>
    <text x="887" y="279" text-anchor="middle" font-size="8" fill="#1a1a2e">Send Reminder</text>

    <!-- Row 4 - failed -->
    <text x="60" y="303" class="screen-body">Grandpa Ed</text>
    <rect x="250" y="291" width="65" height="18" rx="9" fill="#ffebee"/>
    <text x="282" y="304" text-anchor="middle" font-size="9" fill="#c0392b">Failed</text>
    <text x="430" y="303" class="screen-body" font-size="9" fill="#c0392b">video.avi — format not supported</text>
    <text x="650" y="303" class="screen-body" font-size="9">3 hours ago</text>
    <rect x="850" y="291" width="75" height="18" rx="4" fill="white" stroke="#1a1a2e"/>
    <text x="887" y="304" text-anchor="middle" font-size="8" fill="#1a1a2e">Send Reminder</text>

    <!-- Annotations -->
    <line x1="940" y1="120" x2="980" y2="90" stroke="#bbb" stroke-dasharray="3"/>
    <text x="985" y="85" class="annotation">At-a-glance stats</text>
    <text x="985" y="98" class="annotation">for organizer</text>
    
    <line x1="935" y1="300" x2="980" y2="310" stroke="#bbb" stroke-dasharray="3"/>
    <text x="985" y="308" class="annotation">Actionable: remind</text>
    <text x="985" y="321" class="annotation">pending contributors</text>
  </g>
</svg>
